[global]
type=global
user_agent=Twenty-AI-Asterisk

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=94.20.25.27
external_signaling_address=94.20.25.27
;local_net=10.0.0.0/8
;local_net=172.16.0.0/12
;local_net=192.168.0.0/16

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060
external_media_address=94.20.25.27
external_signaling_address=94.20.25.27
;local_net=10.0.0.0/8
;local_net=172.16.0.0/12
;local_net=192.168.0.0/16

[ai-client]
type=endpoint
transport=transport-udp
context=ai-internal
disallow=all
allow=ulaw,alaw,opus
auth=ai-client-auth
aors=ai-client
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

; Local credentials are intentionally untracked. Copy pjsip.local.conf.example.
#include pjsip.local.conf

[ai-client]
type=aor
max_contacts=5
remove_existing=yes
qualify_frequency=30
